<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama UML - Servidor Minecraft</title>
<link rel="stylesheet" href="estilos/estilos2.css">
</head>
<body>
<div class="uml">
<div class="clase">
ServidorMinecraft
</div>
<div class="atributos">
<ul>
<li>- capacidad : int</li>
<li>- jugadores : dict</li>
</ul>
</div>
<div class="metodos">
<ul>
<li>+ __init__(capacidad)</li>
<li>+ agregar_jugador(nombre, diamantes)</li>
<li>+ verificar_stacks()</li>
<li>+ jugador_con_mas_diamantes()</li>
<li>+ total_diamantes()</li>
</ul>
</div>
</div>
</body>
</html>
