<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama UML - Bus</title>
<link rel="stylesheet" href="estilos/estilos.css">
</head>
<body>
<div class="uml">
<div class="clase">
Bus
</div>
<div class="atributos">
<ul>
<li>- capacidad : int</li>
<li>- pasajeros : int</li>
<li>- costo_pasaje : float</li>
</ul>
</div>
<div class="metodos">
<ul>
<li>+ __init__(capacidad)</li>
<li>+ subir_pasajeros(cantidad)</li>
<li>+ cobrar_pasaje()</li>
<li>+ asientos_disponibles()</li>
</ul>
</div>
</div>
</body>
</html>
